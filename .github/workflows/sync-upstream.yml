name: Sync Upstream

on:
  schedule:
    # Daily at UTC 00:00
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          # Use PAT to push so downstream workflows (docker-build) are triggered
          token: ${{ secrets.FORK_SYNC_PAT || secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/abcduyt1243-git/deepseek-cursor-proxy-turbo.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Check for new commits
        id: check
        run: |
          UPSTREAM=$(git rev-parse upstream/main)
          HEAD=$(git rev-parse HEAD)
          if [ "$UPSTREAM" = "$HEAD" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "Already up to date with upstream."
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            echo "Upstream has new commits, merging..."
          fi

      - name: Merge upstream
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save upstream's .gitignore before merge so we can
          # reconcile it afterward (both sides added it independently)
          if git cat-file -e upstream/main:.gitignore 2>/dev/null; then
            git show upstream/main:.gitignore > /tmp/upstream-gitignore
          else
            touch /tmp/upstream-gitignore
          fi

          # Prefer our version for any conflicts
          git merge upstream/main --allow-unrelated-histories -X ours \
            -m "Merge upstream/main" || {
              echo "Merge failed, check for non-.gitignore conflicts"
              exit 1
            }

          # Append upstream's unique gitignore lines
          if [ -s /tmp/upstream-gitignore ]; then
            echo "" >> .gitignore
            echo "# === Merged from upstream ===" >> .gitignore
            grep -vxFf .gitignore /tmp/upstream-gitignore >> .gitignore || true
            git add .gitignore
            git commit --amend --no-edit
          fi

          git push origin main
